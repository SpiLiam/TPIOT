<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IoT Dashboard — Capteur Température</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }
  header { background: #1a1d2e; padding: 16px 24px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #2a2d3e; }
  header h1 { font-size: 1.2rem; font-weight: 600; }
  .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
  .badge.connected    { background: #1a4a2e; color: #4ade80; }
  .badge.error        { background: #4a1a1a; color: #f87171; }
  .badge.reconnecting { background: #4a3a1a; color: #fbbf24; }
  .badge.connecting   { background: #1a2a4a; color: #60a5fa; }
  .config-info { margin-left: auto; font-size: 0.75rem; color: #888; }
  .btn-settings { background: #2a2d3e; border: 1px solid #3a3d4e; color: #aaa; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }
  .btn-settings:hover { background: #3a3d4e; color: #fff; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #1a1d2e; border: 1px solid #2a2d3e; border-radius: 12px; padding: 24px; width: 420px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
  .modal h3 { margin-bottom: 20px; font-size: 1rem; }
  .modal label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 4px; margin-top: 14px; }
  .modal input { width: 100%; background: #0f1117; border: 1px solid #2a2d3e; color: #e0e0e0; padding: 8px 12px; border-radius: 8px; font-size: 0.9rem; }
  .modal input:focus { outline: none; border-color: #4ade80; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
  .btn-primary { background: #1a4a2e; color: #4ade80; border: 1px solid #4ade80; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
  .btn-primary:hover { background: #2a5a3e; }
  .btn-cancel  { background: transparent; color: #888; border: 1px solid #2a2d3e; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
  .btn-cancel:hover { color: #fff; }

  .grid { display: grid; grid-template-columns: 300px 1fr; gap: 20px; padding: 20px; }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

  .card { background: #1a1d2e; border-radius: 12px; padding: 20px; border: 1px solid #2a2d3e; }
  .card h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 16px; }

  .temp-display { text-align: center; padding: 20px 0; }
  .temp-value { font-size: 4rem; font-weight: 700; line-height: 1; }
  .temp-unit  { font-size: 1.5rem; color: #888; }
  .temp-sensor { font-size: 0.8rem; color: #888; margin-top: 8px; }
  .temp-time   { font-size: 0.75rem; color: #555; margin-top: 4px; }

  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
  .stat { background: #0f1117; border-radius: 8px; padding: 12px; text-align: center; }
  .stat-label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
  .stat-value { font-size: 1.2rem; font-weight: 600; margin-top: 4px; }

  .chart-card { grid-column: 1 / -1; }
  canvas { max-height: 280px; }

  .history-list { max-height: 280px; overflow-y: auto; }
  .history-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #2a2d3e; font-size: 0.82rem; }
  .history-item:last-child { border-bottom: none; }
  .history-temp { font-weight: 600; }
  .history-time { color: #888; }

  .no-data { text-align: center; color: #555; padding: 40px 0; font-size: 0.9rem; }

  /* Couleurs température */
  .cold   { color: #60a5fa; }
  .normal { color: #4ade80; }
  .warm   { color: #fb923c; }
  .hot    { color: #f87171; }
</style>
</head>
<body>
<header>
  <span>🌡️</span>
  <h1>IoT Dashboard</h1>
  <span id="badge" class="badge connecting">Connexion...</span>
  <span id="config-info" class="config-info"></span>
  <button class="btn-settings" onclick="openSettings()">⚙ Broker</button>
</header>

<!-- Modal settings -->
<div id="modal" class="modal-overlay">
  <div class="modal">
    <h3>⚙ Configuration du broker MQTT</h3>
    <label>Host (DNS ou IP)</label>
    <input id="s-host" type="text" placeholder="iot-mqtt-nlb-xxx.elb.us-east-1.amazonaws.com">
    <label>Port</label>
    <input id="s-port" type="number" placeholder="1883" value="1883">
    <label>Topic</label>
    <input id="s-topic" type="text" placeholder="sensors/temperature" value="sensors/temperature">
    <label>Utilisateur (optionnel)</label>
    <input id="s-user" type="text" placeholder="dashboard">
    <label>Mot de passe (optionnel)</label>
    <input id="s-pass" type="password" placeholder="Dashboard2024!">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSettings()">Annuler</button>
      <button class="btn-primary" onclick="applySettings()">Appliquer</button>
    </div>
  </div>
</div>

<div class="grid">
  <!-- Valeur courante -->
  <div class="card">
    <h2>Température actuelle</h2>
    <div class="temp-display">
      <div id="temp-value" class="temp-value normal">--</div>
      <div class="temp-unit">°C</div>
      <div id="temp-sensor" class="temp-sensor">--</div>
      <div id="temp-time" class="temp-time">--</div>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Min</div>
        <div id="stat-min" class="stat-value cold">--</div>
      </div>
      <div class="stat">
        <div class="stat-label">Max</div>
        <div id="stat-max" class="stat-value hot">--</div>
      </div>
      <div class="stat">
        <div class="stat-label">Moyenne</div>
        <div id="stat-avg" class="stat-value normal">--</div>
      </div>
      <div class="stat">
        <div class="stat-label">Mesures</div>
        <div id="stat-count" class="stat-value">0</div>
      </div>
    </div>
  </div>

  <!-- Historique liste -->
  <div class="card">
    <h2>Historique récent</h2>
    <div id="history-list" class="history-list">
      <div class="no-data">En attente de données...</div>
    </div>
  </div>

  <!-- Graphique -->
  <div class="card chart-card">
    <h2>Évolution de la température</h2>
    <canvas id="chart"></canvas>
  </div>
</div>

<script>
// ─── Chart ───────────────────────────────────────────────────
const ctx = document.getElementById('chart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [{
      label: 'Température (°C)',
      data: [],
      borderColor: '#4ade80',
      backgroundColor: 'rgba(74,222,128,0.1)',
      borderWidth: 2,
      pointRadius: 3,
      pointBackgroundColor: '#4ade80',
      tension: 0.4,
      fill: true,
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: true,
    animation: { duration: 300 },
    scales: {
      x: { ticks: { color: '#888', maxTicksLimit: 10 }, grid: { color: '#2a2d3e' } },
      y: { ticks: { color: '#888' }, grid: { color: '#2a2d3e' }, suggestedMin: 15, suggestedMax: 30 }
    },
    plugins: { legend: { labels: { color: '#888' } } }
  }
});

// ─── Helpers ─────────────────────────────────────────────────
function tempClass(v) {
  if (v < 18) return 'cold';
  if (v < 26) return 'normal';
  if (v < 30) return 'warm';
  return 'hot';
}

function formatTime(iso) {
  return new Date(iso).toLocaleTimeString('fr-FR');
}

function updateStats(history) {
  if (!history.length) return;
  const vals = history.map(h => h.value);
  const min = Math.min(...vals), max = Math.max(...vals);
  const avg = vals.reduce((a, b) => a + b, 0) / vals.length;
  document.getElementById('stat-min').textContent   = min.toFixed(1) + '°';
  document.getElementById('stat-max').textContent   = max.toFixed(1) + '°';
  document.getElementById('stat-avg').textContent   = avg.toFixed(1) + '°';
  document.getElementById('stat-count').textContent = history.length;
}

function updateChart(history) {
  chart.data.labels   = history.map(h => formatTime(h.ts_iso));
  chart.data.datasets[0].data = history.map(h => h.value);
  chart.update('none');
}

function updateHistoryList(history) {
  const list = document.getElementById('history-list');
  if (!history.length) { list.innerHTML = '<div class="no-data">En attente de données...</div>'; return; }
  list.innerHTML = [...history].reverse().slice(0, 20).map(h => `
    <div class="history-item">
      <span class="history-temp ${tempClass(h.value)}">${h.value.toFixed(2)} °C</span>
      <span class="history-time">${formatTime(h.ts_iso)}</span>
    </div>`).join('');
}

function updateCurrent(point) {
  const el = document.getElementById('temp-value');
  el.textContent = point.value.toFixed(2);
  el.className   = 'temp-value ' + tempClass(point.value);
  document.getElementById('temp-sensor').textContent = '📡 ' + point.sensor_id;
  document.getElementById('temp-time').textContent   = formatTime(point.ts_iso);
}

function setBadge(status, error) {
  const b = document.getElementById('badge');
  const labels = { connected: '● Connecté', error: '● Erreur', reconnecting: '↻ Reconnexion...', connecting: '… Connexion' };
  b.textContent  = labels[status] || status;
  b.className    = 'badge ' + status;
  if (error) b.title = error;
}

// ─── Settings modal ──────────────────────────────────────────
function openSettings() {
  const s = document.getElementById('modal');
  fetch('/api/status').then(r => r.json()).then(d => {
    document.getElementById('s-host').value  = d.host  || '';
    document.getElementById('s-port').value  = d.port  || 1883;
    document.getElementById('s-topic').value = d.topic || 'sensors/temperature';
    document.getElementById('s-user').value  = d.user  || '';
    document.getElementById('s-pass').value  = '';
  });
  s.classList.add('open');
}
function closeSettings() { document.getElementById('modal').classList.remove('open'); }
function applySettings() {
  const host  = document.getElementById('s-host').value.trim();
  const port  = parseInt(document.getElementById('s-port').value) || 1883;
  const topic = document.getElementById('s-topic').value.trim() || 'sensors/temperature';
  const user  = document.getElementById('s-user').value.trim();
  const pass  = document.getElementById('s-pass').value;
  if (!host) { alert('Host requis'); return; }
  fetch('/api/config', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ host, port, topic, user, pass })
  }).then(() => {
    closeSettings();
    history = [];
    updateChart([]);
    updateHistoryList([]);
    document.getElementById('temp-value').textContent = '--';
    document.getElementById('temp-sensor').textContent = '--';
    document.getElementById('temp-time').textContent = '--';
  });
}
document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeSettings();
});

// ─── WebSocket ───────────────────────────────────────────────
let history = [];

function connect() {
  const ws = new WebSocket(`ws://${location.host}`);

  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);
    if (msg.type === 'init') {
      history = msg.history || [];
      setBadge(msg.status);
      if (msg.config) document.getElementById('config-info').textContent = `${msg.config.host}:${msg.config.port} → ${msg.config.topic}${msg.config.user ? ' ['+msg.config.user+']' : ''}`;
      updateChart(history);
      updateHistoryList(history);
      updateStats(history);
      if (history.length) updateCurrent(history[history.length - 1]);
    } else if (msg.type === 'measurement') {
      history.push(msg.data);
      if (history.length > 60) history.shift();
      updateCurrent(msg.data);
      updateChart(history);
      updateHistoryList(history);
      updateStats(history);
    } else if (msg.type === 'status') {
      setBadge(msg.status, msg.error);
    }
  };

  ws.onclose = () => { setBadge('reconnecting'); setTimeout(connect, 3000); };
  ws.onerror = () => setBadge('error');
}

connect();
</script>
</body>
</html>
